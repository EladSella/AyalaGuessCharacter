name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Add Android platform (if not present)
        run: npx cap add android || true

      - name: Sync Capacitor assets
        run: npx cap sync android

      - name: Generate Keystore if missing
        run: |
          if [ ! -f android/app/release.keystore ]; then
            keytool -genkey -v -keystore android/app/release.keystore -alias ayala-key -keyalg RSA -keysize 2048 -validity 10000 -storepass ayala123 -keypass ayala123 -dname "CN=Elad Sela, OU=MayaOS, O=MayaOS, L=Tel Aviv, S=Tel Aviv, C=IL"
          fi

      - name: Build APK and AAB (App Bundle)
        working-directory: android
        run: ./gradlew bundleRelease assembleRelease

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ayala-game-artifacts
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/release.keystore
